<div style="padding:20px; font-family:Arial; background:#f4f4f9; height:100vh; display:flex; flex-direction:column;">
  <h1 style="color:#ff4081;">Owen.Ai</h1>

  <div id="chatbox" style="flex:1; overflow-y:auto; border:1px solid #ccc; padding:10px; background:#fff; margin-bottom:10px;"></div>

  <div style="display:flex;">
    <input
      id="userInput"
      placeholder="Message Owen.Ai…"
      style="flex:1; padding:10px; font-size:16px;"
      onkeydown="if(event.key==='Enter') sendMessage();"
    />
    <button onclick="sendMessage()" style="padding:10px; margin-left:5px;">Send</button>
  </div>
</div>

<script>

const chatbox = document.getElementById("chatbox");

function appendMessage(role, text) {

  const div = document.createElement("div");
  div.style.marginBottom = "10px";
  const strong = document.createElement("strong");
  strong.style.color = role === "You" ? "#007bff" : "#e91e63";
  strong.textContent = `${role}: `;
  div.appendChild(strong);
  div.appendChild(document.createTextNode(text));

  chatbox.appendChild(div);

  chatbox.scrollTop = chatbox.scrollHeight;

}

async function sendMessage() {

  const input = document.getElementById("userInput");

  const message = input.value.trim();
  if (!message) return;

  appendMessage("You", message);

  input.value = "";

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok) {
      appendMessage("Owen.Ai", data.reply || "Sorry—something went wrong.");
      return;
    }

    appendMessage("Owen.Ai", data.reply || "No response.");
  } catch (error) {
    appendMessage("Owen.Ai", "Sorry—there was a network error.");
  }

}

// load first message from welcome page

window.onload = () => {

  const firstMessage = localStorage.getItem("firstMessage");

  if (firstMessage) {

    localStorage.removeItem("firstMessage");

    document.getElementById("userInput").value = firstMessage;

    sendMessage();

  }

};

</script>
