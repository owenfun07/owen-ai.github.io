<!DOCTYPE html>
<html>
<head>
  <title>Owen.Ai</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      color: #000000;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Owen.AI</h1>
    <p>Welcome to Owen.AI! Type anything to get started</p>
    <input
      id="startInput"
      placeholder="What's on your mind…"
      onkeydown="handleStart(event)"
      autofocus
    />
  </div>

<script>
function handleStart(event) {

  if (event.key === "Enter") {

    const message = event.target.value.trim();
    if (!message) return;

    localStorage.setItem("firstMessage", message);

    window.location.href = "/chat.html";

  }
}
</script>
</body>
</html>
